services:
  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Containerfile

    ports:
      - "8000:8000"

    env_file:
      - .env.container

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WATCHFILES_FORCE_POLLING: "true"

    depends_on:
      - redis

    volumes:
      - .:/app:Z

    command:
      - python
      - -m
      - uvicorn
      - src.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
