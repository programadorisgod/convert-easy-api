version: '3.8'

services:
  # Redis - Queue and Event Store
  redis:
    image: redis:7-alpine
    container_name: easy-convert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easy-convert-network

  # Easy Convert API
  api:
    build:
      context: .
      dockerfile: Containerfile
    container_name: easy-convert-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.container
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - /tmp/easy-convert:/tmp/easy-convert
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - easy-convert-network
    labels:
      - "com.easy-convert.service=api"
      - "com.easy-convert.version=1.0.0"

networks:
  easy-convert-network:
    driver: bridge
    name: easy-convert-network

volumes:
  redis-data:
    driver: local
    name: easy-convert-redis-data
