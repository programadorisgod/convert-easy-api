services:
  # Redis Service (Managed Redis)
  - type: redis
    name: easy-convert-redis
    plan: free
    ipAllowList: []

  # Web Service (FastAPI Application)
  - type: web
    name: easy-convert-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Containerfile
    dockerContext: .
    envVars:
      # Application
      - key: APP_NAME
        value: Easy Convert API
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      
      # API Configuration
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: '["https://your-frontend-domain.com"]'
      
      # Redis Configuration (automatically connected to managed Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: easy-convert-redis
          property: connectionString
      - key: REDIS_MAX_CONNECTIONS
        value: 10
      
      # File Upload Limits
      - key: MAX_FILE_SIZE_MB
        value: 100
      - key: CHUNK_SIZE_MB
        value: 5
      - key: TEMP_DIR
        value: /tmp/easy_convert
      
      # Job Processing
      - key: JOB_TTL_HOURS
        value: 24
      - key: JOB_CLEANUP_HOURS
        value: 1
      - key: MAX_CONVERSION_TIME_SECONDS
        value: 300
      
      # Rate Limiting
      - key: RATE_LIMIT_UPLOADS_PER_HOUR
        value: 100
      - key: RATE_LIMIT_CONCURRENT_JOBS_PER_IP
        value: 10
      
      # Image Conversion Settings
      - key: IMAGE_QUALITY
        value: 85
      
      # Worker Settings
      - key: WORKER_CONCURRENCY
        value: 2
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: 1
      
      # Observability
      - key: STRUCTURED_LOGS
        value: true
    
    healthCheckPath: /health
    
    autoDeploy: true
    
    # Custom start command (uses the CMD from Containerfile)
    # dockerCommand: python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
