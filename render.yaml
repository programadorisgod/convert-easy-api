services:
  # Redis Service (Managed Redis)
  - type: redis
    name: easy-convert-redis
    plan: free
    ipAllowList: []

  # Web Service (FastAPI Application)
  - type: web
    name: easy-convert-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Containerfile
    dockerContext: .
    envVars:
      # Application
      - key: APP_NAME
        value: Easy Convert API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      
      # API Configuration
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: '["https://convert-easy-frontend.vercel.app"]'
      
      # Redis Configuration (automatically connected to managed Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: easy-convert-redis
          property: connectionString
      
      # Queue Configuration
      - key: QUEUE_NAME
        value: easy-convert-jobs
      - key: QUEUE_MAX_RETRIES
        value: 3
      - key: QUEUE_RETRY_DELAY
        value: 2000
      - key: QUEUE_CLEANUP_INTERVAL
        value: 3600
      
      # Storage Configuration
      - key: STORAGE_BASE_PATH
        value: /tmp/easy-convert
      - key: STORAGE_CHUNK_SIZE_MB
        value: 10
      - key: STORAGE_UPLOAD_TIMEOUT_MINUTES
        value: 30
      - key: STORAGE_RESULT_TTL_HOURS
        value: 24
      
      # File Size Limits
      - key: MAX_FILE_SIZE
        value: 104857600
      - key: MAX_CHUNK_SIZE
        value: 10485760
      - key: MAX_CONVERSION_TIME_SECONDS
        value: 300
      
      # Worker Settings
      - key: WORKER_CONCURRENCY
        value: 2
      
      # Supported Formats
      - key: SUPPORTED_IMAGE_INPUT_FORMATS
        value: '["jpg","jpeg","png","gif","webp","bmp","tiff","svg","heic","avif"]'
      - key: SUPPORTED_IMAGE_OUTPUT_FORMATS
        value: '["jpg","jpeg","png","gif","webp","bmp","tiff","ico","heic","avif"]'
      
      # Event Configuration
      - key: EVENT_STREAM_MAX_LEN
        value: 1000
      - key: EVENT_TTL_HOURS
        value: 24
    
    healthCheckPath: /health
    
    autoDeploy: true
    
    # Custom start command (uses the CMD from Containerfile)
    # dockerCommand: python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
